name: Hourly News Update

on:
  schedule:
    # This runs at the start of every hour (12:00, 1:00, 2:00, etc.)
    - cron: '0 * * * *'
  # This button allows you to test it manually whenever you want
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install required libraries
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run AI News Scraper
        env:
          # This connects the script to your secret keys in GitHub Settings
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
        run: python main.py
