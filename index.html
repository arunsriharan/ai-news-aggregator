<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pulse | Global Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined">
    <style>
        /* (Styles remain the same as previous professional version, but adding comment styles) */
        .comment-section { margin-top: 15px; padding: 10px; background: #f0f2f5; border-radius: 8px; font-size: 0.9rem; display: none; }
        .comment-input { width: 100%; border-radius: 20px; border: 1px solid #ddd; padding: 8px 15px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <nav>
        <div class="logo" onclick="location.reload()">AI PULSE</div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <span class="material-icons-outlined" onclick="toggleTheme()" style="cursor:pointer">dark_mode</span>
            <button id="loginBtn" onclick="handleAuth()" style="background:var(--accent); color:white; border:none; padding:8px 16px; border-radius:20px; font-weight:bold; cursor:pointer">Login with Google</button>
        </div>
    </nav>

    <div class="container">
        <main id="news-feed"></main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "REPLACE_WITH_YOUR_NEW_API_KEY", // GET A NEW ONE IN GOOGLE AI STUDIO!
            authDomain: "ai-news-aggregator-7d594.firebaseapp.com",
            projectId: "ai-news-aggregator-7d594",
            storageBucket: "ai-news-aggregator-7d594.firebasestorage.app",
            messagingSenderId: "1032109819154",
            appId: "1:1032109819154:web:0aeca97beb10cf6c789fcb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;

        // AUTH LOGIC
        window.handleAuth = () => {
            signInWithPopup(auth, provider).then((result) => {
                currentUser = result.user;
                document.getElementById('loginBtn').innerText = currentUser.displayName;
            }).catch((error) => console.error("Auth failed:", error));
        };

        // VOTING LOGIC
        window.castVote = async (articleId, type) => {
            if (!currentUser) { alert("Please login to vote!"); return; }
            const artRef = doc(db, "articles", articleId);
            await updateDoc(artRef, {
                [type === 'agree' ? 'agree_votes' : 'disagree_votes']: increment(1)
            });
        };

        // DISPLAY LOGIC (Updates cards with working buttons)
        onSnapshot(collection(db, "articles"), (snapshot) => {
            const feed = document.getElementById('news-feed');
            feed.innerHTML = '';
            snapshot.forEach(docSnap => {
                const article = docSnap.data();
                const id = docSnap.id;
                feed.innerHTML += `
                    <div class="card">
                        <div class="card-body">
                            <h3 class="card-title">${article.title}</h3>
                            <p class="card-summary">${article.summary}</p>
                        </div>
                        <div class="card-footer">
                            <div class="votes">
                                <button onclick="castVote('${id}', 'agree')" class="v-count">👍 ${article.agree_votes}</button>
                                <button onclick="castVote('${id}', 'disagree')" class="v-count">👎 ${article.disagree_votes}</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
